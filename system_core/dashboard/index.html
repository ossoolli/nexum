<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NEXUM | Sovereign Dashboard</title>
    <style>
        body { background: #0a0a0a; color: #d4af37; font-family: 'Segoe UI', serif; margin: 0; padding: 40px; }
        .container { max-width: 1000px; margin: auto; border: 1px solid #1a1a1a; padding: 30px; border-radius: 8px; }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; border-bottom: 1px solid #1a1a1a; padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
        .card { background: #0f0f0f; border: 1px solid #1a1a1a; padding: 20px; border-radius: 4px; }
        .card h3 { color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; }
        .value { font-size: 24px; font-weight: bold; }
        .founder { margin-top: 60px; font-size: 12px; color: #444; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NEXUM SOVEREIGN OS</h1>
        <div class="grid">
            <div class="card">
                <h3>System Health</h3>
                <div class="value">98.4%</div>
            </div>
            <div class="card">
                <h3>Active Agents</h3>
                <div class="value">12 Ready</div>
            </div>
            <div class="card">
                <h3>Treasury (zkSync)</h3>
                <div class="value">Verified</div>
            </div>
        </div>
        <div class="founder">Designed & Authorized by Mutaz Ismail Ahmed Tailakh</div>
    </div>
</body>
</html>
